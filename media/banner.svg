<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#252526"/>
    </linearGradient>
    <linearGradient id="cubeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5d44f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e6b800" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Subtle right-side accent gradient -->
  <rect x="640" y="0" width="640" height="640" fill="#f5d44f" fill-opacity="0.02"/>

  <!-- ── Large isometric cube (left side) ─────────────────────────── -->
  <g transform="translate(320, 320)" filter="url(#softGlow)">
    <!-- Halo -->
    <ellipse cx="0" cy="40" rx="220" ry="30" fill="#f5d44f" fill-opacity="0.06"/>

    <!-- Top face fill -->
    <polygon points="0,-200 180,-100 0,0 -180,-100"
      fill="#f5d44f" fill-opacity="0.12"/>
    <!-- Right face fill -->
    <polygon points="0,0 180,-100 180,100 0,200"
      fill="#f5d44f" fill-opacity="0.07"/>
    <!-- Left face fill -->
    <polygon points="0,0 -180,-100 -180,100 0,200"
      fill="#f5d44f" fill-opacity="0.04"/>

    <!-- Cube edges -->
    <g fill="none" stroke="url(#cubeGlow)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
      <!-- Top face -->
      <polygon points="0,-200 180,-100 0,0 -180,-100"/>
      <!-- Vertical edges -->
      <line x1="-180" y1="-100" x2="-180" y2="100"/>
      <line x1="180" y1="-100" x2="180" y2="100"/>
      <line x1="0" y1="0" x2="0" y2="200"/>
      <!-- Bottom face edges -->
      <line x1="-180" y1="100" x2="0" y2="200"/>
      <line x1="0" y1="200" x2="180" y2="100"/>
    </g>

    <!-- Mesh overlay on top face (grid lines) -->
    <g stroke="#f5d44f" stroke-width="0.8" stroke-opacity="0.3">
      <!-- Horizontal grid lines on top face (3 lines) -->
      <line x1="-60" y1="-167" x2="120" y2="-67"/>
      <line x1="-120" y1="-133" x2="60" y2="-33"/>
      <!-- Vertical grid lines on top face -->
      <line x1="60" y1="-167" x2="-120" y2="-67"/>
      <line x1="120" y1="-133" x2="-60" y2="-33"/>
    </g>

    <!-- Axes indicator -->
    <g transform="translate(-140, 130)">
      <line x1="0" y1="0" x2="50" y2="0" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
      <line x1="0" y1="0" x2="0" y2="-50" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
      <line x1="0" y1="0" x2="-25" y2="25" stroke="#3498db" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
      <text x="56" y="5" fill="#e74c3c" font-family="Arial" font-size="16" font-weight="bold">X</text>
      <text x="-8" y="-56" fill="#2ecc71" font-family="Arial" font-size="16" font-weight="bold">Z</text>
      <text x="-44" y="40" fill="#3498db" font-family="Arial" font-size="16" font-weight="bold">Y</text>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="640" y1="60" x2="640" y2="580" stroke="#f5d44f" stroke-width="1" stroke-opacity="0.2"/>

  <!-- ── Right side: text ──────────────────────────────────────────── -->
  <!-- Main title -->
  <text x="680" y="200" font-family="'Arial', system-ui, sans-serif" font-size="64" font-weight="bold" fill="#ffffff" letter-spacing="-1">OpenSCAD</text>
  <text x="680" y="278" font-family="'Arial', system-ui, sans-serif" font-size="64" font-weight="bold" fill="#f5d44f" letter-spacing="-1">Renderer</text>

  <!-- Subtitle -->
  <text x="682" y="330" font-family="'Arial', system-ui, sans-serif" font-size="26" fill="#aaaaaa" letter-spacing="1">Live 3D Preview  ·  AI-Powered</text>

  <!-- Feature pills -->
  <g transform="translate(680, 390)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="44" rx="22" fill="#f5d44f" fill-opacity="0.15" stroke="#f5d44f" stroke-width="1" stroke-opacity="0.4"/>
    <text x="80" y="28" font-family="Arial" font-size="18" fill="#f5d44f" text-anchor="middle">🔍 3D Preview</text>

    <!-- Pill 2 -->
    <rect x="174" y="0" width="170" height="44" rx="22" fill="#f5d44f" fill-opacity="0.15" stroke="#f5d44f" stroke-width="1" stroke-opacity="0.4"/>
    <text x="259" y="28" font-family="Arial" font-size="18" fill="#f5d44f" text-anchor="middle">🤖 AI-Powered</text>

    <!-- Pill 3 -->
    <rect x="358" y="0" width="170" height="44" rx="22" fill="#f5d44f" fill-opacity="0.15" stroke="#f5d44f" stroke-width="1" stroke-opacity="0.4"/>
    <text x="443" y="28" font-family="Arial" font-size="18" fill="#f5d44f" text-anchor="middle">🖨️ FDM-Ready</text>
  </g>

  <!-- AI commands hint -->
  <g transform="translate(680, 470)">
    <text font-family="'Courier New', monospace" font-size="16" fill="#666666">
      <tspan x="0" dy="0" fill="#555555">@scad </tspan><tspan fill="#f5d44f">/create</tspan><tspan fill="#888888">  ·  </tspan>
      <tspan fill="#555555">@scad </tspan><tspan fill="#f5d44f">/debug</tspan><tspan fill="#888888">  ·  </tspan>
      <tspan fill="#555555">@scad </tspan><tspan fill="#f5d44f">/optimize</tspan>
    </text>
  </g>

  <!-- Version badge -->
  <g transform="translate(680, 540)">
    <rect x="0" y="0" width="82" height="28" rx="4" fill="#2d7d46"/>
    <text x="41" y="19" font-family="Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">v0.1.0</text>
    <rect x="92" y="0" width="56" height="28" rx="4" fill="#0a6ebd"/>
    <text x="120" y="19" font-family="Arial" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="bold">MIT</text>
  </g>
</svg>
