    <polygon points="64,58 102,36 102,80 64,102" fill="#f5d44f" fill-opacity="0.10"/>
    <polygon points="64,58 26,36 26,80 64,102" fill="#f5d44f" fill-opacity="0.06"/>
    <g fill="none" stroke="url(#edge)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
      <polygon points="64,14 102,36 64,58 26,36"/>
      <line x1="26" y1="36" x2="26" y2="80"/>
      <line x1="102" y1="36" x2="102" y2="80"/>
      <line x1="64" y1="58" x2="64" y2="102"/>
      <line x1="26" y1="80" x2="64" y2="102"/>
      <line x1="64" y1="102" x2="102" y2="80"/>
    </g>
  </g>
  <g transform="translate(18,108)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-11" y2="11" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  </g>
